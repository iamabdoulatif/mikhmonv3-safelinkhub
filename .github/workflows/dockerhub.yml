name: Build and push DockerHub images

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: latif225/mikhmonv3-safelinkhub
  DOCKERFILE: Dockerfile.mikrotik
  DELETE_DOCKERHUB_EXISTING_TAGS: "1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  flattened-routeros-images:
    name: Flattened RouterOS images
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          cache-image: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Install skopeo
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo

      - name: Compute build metadata
        run: |
          stamp="$(date -u +%Y%m%d%H%M%S)"
          echo "BUILD_STAMP=${stamp}" >> "$GITHUB_ENV"
          echo "BUILD_VERSION=v3.0.${stamp}" >> "$GITHUB_ENV"

      - name: Build, flatten and push
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          BUILD_STAMP: ${{ env.BUILD_STAMP }}
          BUILD_VERSION: ${{ env.BUILD_VERSION }}
          MANIFEST_TAGS: latest
        run: bash tools/ci-build-push-flattened.sh

      - name: Update DockerHub description
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: latif225/mikhmonv3-safelinkhub
          short-description: "Mikhmon v3 pour MikroTik Hotspot: vouchers, revenus, expiration et IP Binding temporise."
          readme-filepath: ./dockerhub/README.md
